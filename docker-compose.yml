version: "3.9"

# ── AegisAI — full stack ────────────────────────────────────────────────
#
#  Services:
#    aegis        FastAPI app  →  http://localhost:8000
#    clickhouse   ClickHouse (unified analytics: CSPM, AI telemetry,
#                 cross-product)  →  http://localhost:8123
#
#  Quick start:
#    1. cp .env.example .env  &&  vim .env   (add your OPENAI_API_KEY)
#    2. docker compose up -d
#    3. docker compose logs -f aegis
#    4. curl http://localhost:8000/
#
#  Dashboard: http://localhost:8000/dashboard  (built-in, ClickHouse-backed)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Application ─────────────────────────────────────────────────────────────
  aegis:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: aegis:latest
    container_name: aegis
    restart: unless-stopped
    ports:
      - "8000:8000"

    # Inject config from .env — secrets never baked into the image
    env_file:
      - .env

    # Override specific values for the containerised environment
    environment:
      # v4.0: Unified ClickHouse analytics (CSPM + AI telemetry + cross-product)
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_ANALYTICS_ENABLED: "true"

    # ── Capabilities ──────────────────────────────────────────────────────────
    # NET_ADMIN + SYS_PTRACE are required for the network remediation agent
    # (iptables DROP rules, isolate_host). Remove these caps in environments
    # where live remediation is disabled (DRY_RUN=true).
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE
    # Prevent privilege escalation beyond the declared caps
    security_opt:
      - no-new-privileges:true

    # Restrict filesystem writes to the reports volume only
    read_only: false
    tmpfs:
      - /tmp

    volumes:
      - reports:/app/reports

    depends_on:
      clickhouse:
        condition: service_healthy

    networks:
      - chainsage-net

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s


  # ── ClickHouse (AegisAI Telemetry — v3.0) ──────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse
    restart: unless-stopped

    environment:
      - CLICKHOUSE_DB=aegis
      - CLICKHOUSE_USER=aegis
      - CLICKHOUSE_PASSWORD=aegis_telemetry
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1

    ports:
      - "8123:8123"    # HTTP interface
      - "9000:9000"    # Native TCP

    volumes:
      - clickhouse-data:/var/lib/clickhouse

    networks:
      - chainsage-net

    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

    ulimits:
      nofile:
        soft: 262144
        hard: 262144



# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  clickhouse-data:
    driver: local
  reports:
    driver: local


# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  chainsage-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
