name: Aegis CSPM — CI Pipeline

on:
  push:
    branches: [ master, main, "release/**" ]
  pull_request:
    branches: [ master, main ]

permissions:
  contents: read
  security-events: write    # for CodeQL SARIF upload
  pull-requests: read

jobs:

  # ── Lint + Import Check ─────────────────────────────────────────────────────
  lint:
    name: Lint & Import Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Import verification
        run: |
          python -c "
          import importlib, sys
          mods = [
            'config', 'auth',
            'modules.agents.orchestrator',
            'modules.analytics.clickhouse_indexer',
            'modules.compliance.stig',
            'modules.compliance.ssp_generator',
            'modules.scanners.base',
            'modules.scanners.acas.scanner',
            'modules.security.audit_log',
            'modules.security.rbac',
            'modules.security.headers',
            'modules.security.fips',
            'modules.security.encryption',
            'modules.transport.mtls',
            # v3.0.0: AI Security modules
            'modules.discovery',
            'modules.redteam',
            'modules.guardrails',
            'modules.policy',
            'modules.telemetry',
            'modules.connectors',
            'modules.ai_security_routes',
            'modules.reports.compliance',
            'modules.tenants.middleware',
          ]
          failed = []
          for m in mods:
            try: importlib.import_module(m)
            except Exception as e: failed.append(f'{m}: {e}')
          if failed:
            print('FAILED:', '\n'.join(failed))
            sys.exit(1)
          print(f'All {len(mods)} modules imported successfully')
          "

  # ── Unit Tests ──────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run AegisAI test suite
        run: pytest tests/ -v --tb=short

  # ── Dependency Vulnerability Scan ───────────────────────────────────────────
  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --format=json --output=pip-audit-results.json || true
          pip-audit -r requirements.txt || echo "::warning::pip-audit found vulnerabilities — review pip-audit-results.json artifact"

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-results
          path: pip-audit-results.json

  # ── CodeQL Static Analysis ──────────────────────────────────────────────────
  codeql:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"

  # ── Secret Scanning ─────────────────────────────────────────────────────────
  secrets-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # full history for git log scanning

      - name: TruffleHog OSS — scan for leaked secrets
        uses: trufflesecurity/trufflehog@v3.94.0
        with:
          path: ./
          base: ${{ github.event.before || github.event.repository.default_branch }}
          head: ${{ github.event.after || 'HEAD' }}
          extra_args: --only-verified

  # ── Docker Image Build Verification ─────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --no-cache -t aegis-cspm:ci .

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "aegis-cspm:ci"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"           # advisory only — SARIF uploaded to Security tab
          ignore-unfixed: true
          vuln-type: "os,library"

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
